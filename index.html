<!DOCTYPE html>
<html>
<head>
  <title>WanMoein Kopi</title>
</head>
<body>
  <h1>Menu</h1>

  <button onclick="order('Es Kopi Susu')">Es Kopi Susu</button>
  <button onclick="order('Americano')">Americano</button>

  <script type="module">
    import { db } from './firebase.js';
    import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const meja = params.get("meja") || "unknown";

    async function order(menu) {
      await addDoc(collection(db, "orders"), {
        menu,
        meja,
        status: "pending",
        waktu: new Date()
      });

      alert("Pesanan dikirim!");
    }

    window.order = order;
  </script>
</body>
</html>
